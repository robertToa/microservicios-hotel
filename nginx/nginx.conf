events {
    worker_connections 1024;
}

http {

    upstream svc-rooms {
        server svc-rooms:8081;
    }

    upstream svc-reservations {
        server svc-reservations:8082;
    }

    server {
        listen 80;

        location /api/v1/rooms {
            proxy_pass http://svc-rooms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/reservations {
            proxy_pass http://svc-reservations;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            return 200 '{"status":"UP","service":"api-gateway"}';
            add_header Content-Type application/json;
        }
    }
}
